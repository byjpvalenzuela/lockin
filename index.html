<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lock-In | JPD Agency Core</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --emerald: #00d15b;
            --glass-bg: rgba(10, 10, 10, 0.8);
            --glass-border: rgba(0, 209, 91, 0.15);
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background: radial-gradient(circle at top right, #002e14 0%, #000000 85%);
            background-attachment: fixed;
            color: white; 
            margin: 0; 
            padding: 0; 
            overflow-x: hidden;
        }

        ::-webkit-scrollbar { display: none; }
        
        .stat-bar { transition: width 1s cubic-bezier(0.65, 0, 0.35, 1); }
        
        .floating-header { 
            position: sticky; 
            top: 12px; 
            z-index: 100; 
            margin: 0 16px;
            background: rgba(10, 10, 10, 0.9); 
            backdrop-filter: blur(25px); 
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.6);
        }

        .bottom-taskbar {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            width: 220px;
            z-index: 1000;
            background: rgba(15, 15, 15, 0.9);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 6px;
            display: flex;
            justify-content: center;
            gap: 8px;
            box-shadow: 0 -10px 40px rgba(0,0,0,0.6);
        }

        /* --- ANIMACIONES SMOOTH --- */
        .animate-view-fade {
            animation: viewFade 0.4s cubic-bezier(0.23, 1, 0.32, 1) forwards;
        }

        @keyframes viewFade {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-day-slide {
            animation: daySlide 0.3s ease-out forwards;
        }

        @keyframes daySlide {
            from { opacity: 0.5; transform: translateX(5px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .btn-glow {
            background: var(--emerald);
            color: black;
            font-weight: 900;
            box-shadow: 0 0 15px rgba(0, 209, 91, 0.3);
            transition: all 0.3s ease;
        }
        .btn-glow:active { transform: scale(0.95); }

        textarea:focus, input:focus, select:focus { 
            outline: none; 
            border-color: var(--emerald); 
            background: rgba(0, 209, 91, 0.05);
        }

        .edit-input {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            padding: 6px 10px;
            color: white;
            width: 100%;
        }

        .day-bar {
            display: flex;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            overflow: hidden;
            width: 100%;
        }

        .day-item {
            flex: 1;
            text-align: center;
            font-size: 8px;
            font-weight: 900;
            padding: 12px 0;
            color: #666;
            text-transform: uppercase;
            border-right: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.2s ease;
            cursor: pointer;
        }
        .day-item:last-child { border-right: none; }
        .day-item.active {
            background: rgba(0, 209, 91, 0.15);
            color: var(--emerald);
        }

        input[type="checkbox"]:checked + div p { text-decoration: line-through; opacity: 0.5; color: var(--emerald); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const Icons = {
            Zap: () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>,
            Target: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>,
            Trash: () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#ef4444" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>,
            Plus: () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
            Edit: () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>,
            Check: () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>,
            Book: () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
        };

        const App = () => {
            const [activeView, setActiveView] = useState('home'); 
            const dayKeys = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
            const dayLabels = ['SUN', 'MON', 'TUE', 'WED', 'THU', 'FRI', 'SAT'];
            const [selectedDay, setSelectedDay] = useState(dayKeys[new Date().getDay()]);

            // --- DATA STATE ---
            const [lockinStart, setLockinStart] = useState(() => localStorage.getItem('jpd_start_date') || '2026-03-08');
            const [lockinEnd, setLockinEnd] = useState(() => localStorage.getItem('jpd_end_date') || '2026-08-07');
            const [wInit, setWInit] = useState(() => localStorage.getItem('jpd_w_init') || '0');
            const [wActual, setWActual] = useState(() => localStorage.getItem('jpd_w_actual') || '0');
            const [cInit, setCInit] = useState(() => localStorage.getItem('jpd_c_init') || '0');
            const [cActual, setCActual] = useState(() => localStorage.getItem('jpd_c_actual') || '0');

            const [taskMode, setTaskMode] = useState('desired');
            const [tasks, setTasks] = useState(() => JSON.parse(localStorage.getItem('jpd_tasks')) || {
                desired: [{ id: '1', text: "Caminar 10k pasos" }],
                minimal: [{ id: '2', text: "7k Pasos Base" }]
            });

            const [schedules, setSchedules] = useState(() => JSON.parse(localStorage.getItem('jpd_schedules')) || {
                Monday: [{ id: 1, time: "08:00 AM", task: "Despertar" }],
                Tuesday: [{ id: 2, time: "08:00 AM", task: "Despertar" }],
                Wednesday: [{ id: 3, time: "08:00 AM", task: "Despertar" }],
                Thursday: [{ id: 4, time: "08:00 AM", task: "Despertar" }],
                Friday: [{ id: 5, time: "08:00 AM", task: "Despertar" }],
                Saturday: [{ id: 6, time: "08:00 AM", task: "Despertar" }],
                Sunday: [{ id: 7, time: "08:00 AM", task: "Despertar" }]
            });

            const [psyItems, setPsyItems] = useState(() => JSON.parse(localStorage.getItem('jpd_psy_items')) || [
                { id: 1, type: 'mindset', text: 'Disciplina es libertad.', author: 'CEO' },
                { id: 2, type: 'fear', text: 'Vivir de un sueldo fijo.', author: 'REALITY' }
            ]);

            const [checkedTasks, setCheckedTasks] = useState(() => JSON.parse(localStorage.getItem('jpd_checkedTasks')) || {});
            const [diaryEntries, setDiaryEntries] = useState(() => JSON.parse(localStorage.getItem('jpd_diary_entries')) || []);
            const [currentNote, setCurrentNote] = useState('');
            const [isEditingTasks, setIsEditingTasks] = useState(false);
            const [isEditingSchedule, setIsEditingSchedule] = useState(false);
            const [psyIndex, setPsyIndex] = useState(0);
            const [fade, setFade] = useState(true);

            // --- LÓGICA DE TIEMPO PERSONALIZADA ---
            const timeMetrics = useMemo(() => {
                const start = new Date(lockinStart).getTime();
                const end = new Date(lockinEnd).getTime();
                const totalDiff = end - start;
                const totalDays = Math.max(0, Math.ceil(totalDiff / (1000 * 60 * 60 * 24)));
                
                const now = new Date().getTime();
                const elapsedSinceStart = now - start;
                const percentage = Math.min(Math.max((elapsedSinceStart / totalDiff) * 100, 0), 100).toFixed(1);
                
                return { totalDays, percentage };
            }, [lockinStart, lockinEnd]);

            useEffect(() => {
                const data = { jpd_start_date: lockinStart, jpd_end_date: lockinEnd, jpd_w_init: wInit, jpd_w_actual: wActual, jpd_c_init: cInit, jpd_c_actual: cActual, jpd_tasks: JSON.stringify(tasks), jpd_schedules: JSON.stringify(schedules), jpd_checkedTasks: JSON.stringify(checkedTasks), jpd_diary_entries: JSON.stringify(diaryEntries), jpd_psy_items: JSON.stringify(psyItems) };
                Object.entries(data).forEach(([k,v]) => localStorage.setItem(k, v));
            }, [lockinStart, lockinEnd, wInit, wActual, cInit, cActual, tasks, schedules, checkedTasks, diaryEntries, psyItems]);

            useEffect(() => {
                const itv = setInterval(() => {
                    setFade(false);
                    setTimeout(() => {
                        setPsyIndex(p => (p + 1) % (psyItems.length || 1));
                        setFade(true);
                    }, 500);
                }, 8000);
                return () => clearInterval(itv);
            }, [psyItems.length]);

            // Handlers
            const applyCurrentToAll = () => {
                const base = JSON.parse(JSON.stringify(schedules[selectedDay]));
                const next = {};
                dayKeys.forEach(k => next[k] = base.map(i => ({...i, id: Math.random()})));
                setSchedules(next);
                setIsEditingSchedule(false);
            };

            const updateTimeComp = (id, part, val) => {
                setSchedules(prev => ({
                    ...prev,
                    [selectedDay]: prev[selectedDay].map(s => {
                        if (s.id !== id) return s;
                        let [h, m_p] = s.time.split(':');
                        let [m, p] = m_p.split(' ');
                        if (part === 'h') h = val.padStart(2, '0');
                        if (part === 'm') m = val.padStart(2, '0');
                        if (part === 'p') p = val;
                        return { ...s, time: `${h}:${m} ${p}` };
                    })
                }));
            };

            return (
                <div className="max-w-md mx-auto min-h-screen ios-fix pb-32">
                    
                    {/* Header Flotante Premium */}
                    <header className="floating-header p-5 animate-view-fade">
                        <div className="flex justify-between items-start">
                            <div>
                                <h1 className="text-xl font-black text-[#00d15b] italic tracking-tighter leading-none mb-1 uppercase">LOCK-IN</h1>
                                <p className="text-[12px] font-black text-white leading-none tracking-tighter">{timeMetrics.totalDays} Días Totales</p>
                            </div>
                            <div className="flex gap-4">
                                <div className="text-right">
                                    <span className="text-[7px] font-black uppercase text-zinc-500 block mb-0.5 tracking-widest">Cash</span>
                                    <span className="text-lg font-black text-white leading-none">${cActual}</span>
                                </div>
                                <div className="text-right border-l border-white/10 pl-4">
                                    <span className="text-[7px] font-black uppercase text-zinc-500 block mb-0.5 tracking-widest">Peso</span>
                                    <span className="text-lg font-black text-white leading-none">{wActual}<span className="text-[8px] ml-0.5 text-zinc-400 font-bold uppercase">Lbs</span></span>
                                </div>
                            </div>
                        </div>
                        <div className="mt-4 px-0.5">
                            <div className="w-full h-1 bg-zinc-900 rounded-full border border-white/5 overflow-hidden">
                                <div className="h-full stat-bar shadow-[0_0_8px_#00d15b]" style={{ width: `${timeMetrics.percentage}%`, backgroundColor: '#00d15b' }}></div>
                            </div>
                        </div>
                    </header>

                    <main key={activeView} className="mt-8 px-5 space-y-8 animate-view-fade">
                        {activeView === 'home' ? (
                            <>
                                {/* Psicología Subrayada */}
                                <section className="flex items-center gap-3 py-2 px-1 border-b border-white/5">
                                    <div className="flex-1 min-h-[36px] flex items-center">
                                        <div className={`transition-opacity duration-500 ${fade ? 'opacity-100' : 'opacity-0'} flex items-center gap-2`}>
                                            <div className={`w-1 h-4 rounded-full ${psyItems[psyIndex]?.type === 'mindset' ? 'bg-[#00d15b]' : 'bg-red-600'}`}></div>
                                            <p className="text-[11px] font-bold italic text-zinc-200">"{psyItems[psyIndex]?.text}"</p>
                                        </div>
                                    </div>
                                </section>

                                {/* Objetivos */}
                                <section className="glass-panel rounded-[2rem] p-7">
                                    <div className="flex justify-between items-center mb-6">
                                        <h2 className="text-lg font-black uppercase italic text-white tracking-tight">Objetivos</h2>
                                        <div className="flex gap-2">
                                            <button onClick={() => setTaskMode(taskMode === 'desired' ? 'minimal' : 'desired')} className={`px-4 py-1.5 rounded-xl text-[9px] font-black uppercase transition-all ${taskMode === 'desired' ? 'bg-[#00d15b] text-black shadow-lg' : 'bg-red-600'}`}>
                                                {taskMode === 'desired' ? 'Deseada' : 'Mínimo'}
                                            </button>
                                            <button onClick={() => setIsEditingTasks(!isEditingTasks)} className="p-2 bg-white/5 rounded-xl border border-white/10 text-zinc-500">
                                                {isEditingTasks ? <Icons.Check /> : <Icons.Edit />}
                                            </button>
                                        </div>
                                    </div>
                                    <div className="space-y-3">
                                        {tasks[taskMode].map(t => (
                                            <div key={t.id} className="flex items-center gap-2">
                                                {!isEditingTasks ? (
                                                    <div onClick={() => setCheckedTasks({...checkedTasks, [t.id]: !checkedTasks[t.id]})} className={`flex-1 flex items-center gap-4 p-4 rounded-[1.5rem] border-2 transition-all ${checkedTasks[t.id] ? 'bg-[#00d15b]/10 border-[#00d15b]/30 opacity-60' : 'bg-black/40 border-white/5'}`}>
                                                        <div className={`w-6 h-6 rounded-lg border-2 flex items-center justify-center ${checkedTasks[t.id] ? 'bg-[#00d15b] border-[#00d15b]' : 'border-zinc-700'}`}>
                                                            {checkedTasks[t.id] && <div className="w-2.5 h-2.5 bg-white rounded-full"></div>}
                                                        </div>
                                                        <p className="flex-1 font-bold text-sm leading-tight">{t.text}</p>
                                                    </div>
                                                ) : (
                                                    <div className="flex-1 flex items-center gap-2">
                                                        <input value={t.text} onChange={(e) => setTasks({...tasks, [taskMode]: tasks[taskMode].map(item => item.id === t.id ? {...item, text: e.target.value} : item)})} className="edit-input font-bold text-xs" />
                                                        <button onClick={() => setTasks({...tasks, [taskMode]: tasks[taskMode].filter(item => item.id !== t.id)})} className="p-2"><Icons.Trash /></button>
                                                    </div>
                                                )}
                                            </div>
                                        ))}
                                        {isEditingTasks && <button onClick={() => setTasks({...tasks, [taskMode]: [...tasks[taskMode], {id: Date.now().toString(), text: "Nuevo Objetivo"}]})} className="w-full py-3 border-2 border-dashed border-white/10 rounded-2xl text-[#00d15b] flex justify-center mt-2"><Icons.Plus /></button>}
                                    </div>
                                </section>

                                {/* Agenda Compacta */}
                                <section className="space-y-4">
                                    <div className="flex justify-between items-center px-1">
                                        <h2 className="text-sm font-black uppercase text-zinc-500 tracking-widest">Agenda</h2>
                                        <button onClick={() => setIsEditingSchedule(!isEditingSchedule)} className="p-2 bg-white/5 rounded-xl border border-white/10 text-zinc-500">
                                            {isEditingSchedule ? <Icons.Check /> : <Icons.Edit />}
                                        </button>
                                    </div>

                                    {/* Barra de días compacta */}
                                    <div className="day-bar">
                                        {dayKeys.map((day, idx) => (
                                            <div 
                                                key={day} 
                                                onClick={() => setSelectedDay(day)}
                                                className={`day-item ${selectedDay === day ? 'active' : ''}`}
                                            >
                                                {dayLabels[idx]}
                                            </div>
                                        ))}
                                    </div>

                                    <div key={selectedDay} className="glass-panel rounded-[2rem] p-2 animate-day-slide">
                                        {schedules[selectedDay].map((item) => (
                                            <div key={item.id} className="flex items-center gap-5 p-5 border-b border-white/5 last:border-0">
                                                {!isEditingSchedule ? (
                                                    <><span className="text-xl font-black text-[#00d15b] w-24 italic tracking-tighter leading-none">{item.time}</span><p className="flex-1 font-bold text-zinc-100 text-sm leading-tight">{item.task}</p></>
                                                ) : (
                                                    <div className="flex-1 flex flex-col gap-3">
                                                        <div className="flex gap-2 items-center">
                                                            <div className="flex bg-black/40 rounded-xl p-1 border border-white/5 items-center">
                                                                <input type="number" min="1" max="12" value={item.time.split(':')[0]} onChange={e => updateTimeComp(item.id, 'h', e.target.value)} className="w-10 bg-transparent text-center text-xs font-black" />
                                                                <span className="text-zinc-600">:</span>
                                                                <input type="number" min="0" max="59" value={item.time.split(':')[1].split(' ')[0]} onChange={e => updateTimeComp(item.id, 'm', e.target.value)} className="w-10 bg-transparent text-center text-xs font-black" />
                                                                <select value={item.time.split(' ')[1]} onChange={e => updateTimeComp(item.id, 'p', e.target.value)} className="bg-transparent text-[8px] font-black uppercase p-1">
                                                                    <option className="bg-black">AM</option>
                                                                    <option className="bg-black">PM</option>
                                                                </select>
                                                            </div>
                                                            <button onClick={() => setSchedules({...schedules, [selectedDay]: schedules[selectedDay].filter(s => s.id !== item.id)})} className="ml-auto p-2 bg-red-950/20 rounded-lg"><Icons.Trash /></button>
                                                        </div>
                                                        <input value={item.task} onChange={(e) => setSchedules({...schedules, [selectedDay]: schedules[selectedDay].map(s => s.id === item.id ? {...s, task: e.target.value} : s)})} className="edit-input text-xs font-bold" />
                                                    </div>
                                                )}
                                            </div>
                                        ))}
                                        {isEditingSchedule && (
                                            <div className="p-4 space-y-2">
                                                <button onClick={() => setSchedules({...schedules, [selectedDay]: [...schedules[selectedDay], {id: Math.random(), time: "08:00 AM", task: "Nueva Tarea"}]})} className="w-full py-4 text-[#00d15b] opacity-50 flex justify-center border-2 border-dashed border-white/5 rounded-xl"><Icons.Plus /></button>
                                                <button onClick={applyCurrentToAll} className="w-full py-3 btn-glow rounded-xl text-[10px] font-black uppercase tracking-widest active:scale-95 transition-all">
                                                    Apply Current to all days
                                                </button>
                                            </div>
                                        )}
                                    </div>
                                </section>

                                {/* Diario Compacto */}
                                <section className="glass-panel rounded-[2rem] p-5 space-y-4">
                                    <div className="flex justify-between items-center px-1">
                                        <div className="flex items-center gap-2 text-zinc-500 font-black text-[9px] uppercase tracking-widest"><Icons.Book /> Diario</div>
                                        <button onClick={() => { if(currentNote) setDiaryEntries([{id:Date.now(), date:new Date().toLocaleDateString('es-ES',{day:'numeric', month:'short'}), content:currentNote}, ...diaryEntries]); setCurrentNote(''); }} className="px-4 py-1.5 bg-[#00d15b] text-black rounded-full font-black text-[9px] uppercase">Guardar</button>
                                    </div>
                                    <textarea value={currentNote} onChange={(e) => setCurrentNote(e.target.value)} placeholder="Reflexión rápida..." className="w-full bg-black/40 rounded-xl p-4 text-xs text-zinc-300 min-h-[60px] border border-white/5 resize-none shadow-inner" />
                                    <div className="space-y-3 mt-4 max-h-[250px] overflow-y-auto">
                                        {diaryEntries.map(entry => (
                                            <div key={entry.id} className="bg-black/20 p-4 rounded-xl border border-white/5 group">
                                                <div className="flex justify-between mb-2">
                                                    <span className="text-[8px] font-black text-[#00d15b] uppercase">{entry.date}</span>
                                                    <button onClick={() => setDiaryEntries(diaryEntries.filter(e => e.id !== entry.id))}><Icons.Trash /></button>
                                                </div>
                                                <textarea value={entry.content} onChange={(e) => setDiaryEntries(diaryEntries.map(ent => ent.id === entry.id ? {...ent, content: e.target.value} : ent))} className="w-full bg-transparent border-none text-[12px] text-zinc-300 italic resize-none h-auto outline-none" />
                                            </div>
                                        ))}
                                    </div>
                                </section>
                            </>
                        ) : (
                            /* SETTINGS */
                            <section className="space-y-8 pb-24 animate-view-fade">
                                {/* STATS */}
                                <div className="glass-panel rounded-[2rem] p-8 space-y-6">
                                    <h2 className="text-lg font-black uppercase italic text-[#00d15b]">STATS</h2>
                                    <div className="space-y-6">
                                        <div className="space-y-2">
                                            <p className="text-[9px] font-black text-zinc-500 uppercase tracking-widest px-1">Peso (Lbs)</p>
                                            <div className="flex gap-2">
                                                <div className="flex-1 bg-black/40 p-3 rounded-xl border border-white/5">
                                                    <span className="text-[7px] text-zinc-600 block uppercase mb-1">Inicial</span>
                                                    <input type="number" value={wInit} onChange={e => setWInit(e.target.value)} className="w-full bg-transparent text-lg font-black outline-none" />
                                                </div>
                                                <div className="flex-1 bg-black/40 p-3 rounded-xl border border-[#00d15b]/20">
                                                    <span className="text-[7px] text-[#00d15b] block uppercase mb-1">Actual</span>
                                                    <input type="number" value={wActual} onChange={e => setWActual(e.target.value)} className="w-full bg-transparent text-lg font-black text-[#00d15b] outline-none" />
                                                </div>
                                            </div>
                                        </div>
                                        <div className="space-y-2">
                                            <p className="text-[9px] font-black text-zinc-500 uppercase tracking-widest px-1">Cash ($)</p>
                                            <div className="flex gap-2">
                                                <div className="flex-1 bg-black/40 p-3 rounded-xl border border-white/5">
                                                    <span className="text-[7px] text-zinc-600 block uppercase mb-1">Inicial</span>
                                                    <input type="number" value={cInit} onChange={e => setCInit(e.target.value)} className="w-full bg-transparent text-lg font-black outline-none" />
                                                </div>
                                                <div className="flex-1 bg-black/40 p-3 rounded-xl border border-[#00d15b]/20">
                                                    <span className="text-[7px] text-[#00d15b] block uppercase mb-1">Actual</span>
                                                    <input type="number" value={cActual} onChange={e => setCActual(e.target.value)} className="w-full bg-transparent text-lg font-black text-[#00d15b] outline-none" />
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                {/* DATES */}
                                <div className="glass-panel rounded-[2rem] p-8 space-y-6">
                                    <h2 className="text-lg font-black uppercase italic text-[#00d15b]">DATES</h2>
                                    <div className="space-y-4">
                                        <div className="flex justify-between items-center bg-black/40 p-4 rounded-2xl border border-white/5">
                                            <span className="text-[9px] font-black uppercase text-zinc-500">Inicio</span>
                                            <input type="date" value={lockinStart} onChange={e => setLockinStart(e.target.value)} className="bg-transparent text-sm font-bold text-[#00d15b] outline-none" />
                                        </div>
                                        <div className="flex justify-between items-center bg-black/40 p-4 rounded-2xl border border-white/5">
                                            <span className="text-[9px] font-black uppercase text-zinc-500">Cierre</span>
                                            <input type="date" value={lockinEnd} onChange={e => setLockinEnd(e.target.value)} className="bg-transparent text-sm font-bold text-[#00d15b] outline-none" />
                                        </div>
                                    </div>
                                </div>

                                {/* MOTIVATION Management */}
                                <div className="space-y-4 px-1">
                                    <div className="flex justify-between items-center px-1">
                                        <h3 className="text-[10px] font-black uppercase text-zinc-600 tracking-widest">Motivation</h3>
                                        <div className="flex gap-2">
                                            <button onClick={() => setPsyItems([{id:Date.now(), type:'mindset', text:'Frase...', author:'CEO'}, ...psyItems])} className="p-2 bg-[#00d15b]/20 rounded-lg border border-[#00d15b]/30 text-[#00d15b]"><Icons.Plus /></button>
                                            <button onClick={() => setPsyItems([{id:Date.now(), type:'fear', text:'Miedo...', author:'REALITY'}, ...psyItems])} className="p-2 bg-red-600/20 rounded-lg border border-red-600/30 text-red-500"><Icons.Plus /></button>
                                        </div>
                                    </div>
                                    {psyItems.map(item => (
                                        <div key={item.id} className={`glass-panel p-6 rounded-3xl border-l-4 ${item.type === 'mindset' ? 'border-l-[#00d15b]' : 'border-l-red-600'}`}>
                                            <div className="flex justify-between mb-3"><span className="text-[8px] font-black uppercase opacity-50">{item.type}</span><button onClick={() => setPsyItems(psyItems.filter(i => i.id !== item.id))}><Icons.Trash /></button></div>
                                            <textarea value={item.text} onChange={(e) => setPsyItems(psyItems.map(i => i.id === item.id ? {...i, text: e.target.value} : i))} className="w-full bg-transparent border-none text-sm font-bold italic resize-none h-12 outline-none" />
                                        </div>
                                    ))}
                                </div>
                            </section>
                        )}
                    </main>

                    {/* Taskbar Inferior Centrado */}
                    <nav className="bottom-taskbar">
                        <button onClick={() => setActiveView('home')} className={`flex-1 py-3 rounded-[18px] text-[10px] font-black uppercase tracking-widest transition-all ${activeView === 'home' ? 'bg-[#00d15b] text-black shadow-[0_0_12px_rgba(0,209,91,0.4)]' : 'text-zinc-500'}`}>Home</button>
                        <button onClick={() => setActiveView('settings')} className={`flex-1 py-3 rounded-[18px] text-[10px] font-black uppercase tracking-widest transition-all ${activeView === 'settings' ? 'bg-[#00d15b] text-black shadow-[0_0_12px_rgba(0,209,91,0.4)]' : 'text-zinc-500'}`}>Settings</button>
                    </nav>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
