<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lock-In 2026 | JPD Agency</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: black; -webkit-tap-highlight-color: transparent; color: white; }
        ::-webkit-scrollbar { display: none; }
        .stat-bar { transition: height 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const Icons = {
            Zap: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>,
            Target: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>,
            Timer: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="10" y1="2" x2="14" y2="2"/><line x1="12" y1="14" x2="15" y2="11"/><circle cx="12" cy="14" r="8"/></svg>,
            Dumbbell: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M6.5 6.5h11"/><path d="M6.5 17.5h11"/><path d="M3 10v4"/><path d="M21 10v4"/><path d="M3 5v14"/><path d="M21 5v14"/><path d="M18 5v14"/><path d="M6 5v14"/></svg>,
            Skull: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M9 10L9.01 10"/><path d="M15 10L15.01 10"/><path d="M10 18l4-8"/><path d="M12 2a8 8 0 0 0-8 8c0 1.5.5 3.5 1 4a3 3 0 0 1 .5 6c0 1 1.5 2 3 2s3-1 3-2a3 3 0 0 1 .5-6c.5-.5 1-2.5 1-4a8 8 0 0 0-8-8z"/></svg>,
            Briefcase: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>,
            Sun: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/></svg>,
            Moon: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>,
            Coffee: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M17 8h1a4 4 0 1 1 0 8h-1"/><path d="M3 8h14v9a4 4 0 0 1-4 4H7a4 4 0 0 1-4-4V8z"/></svg>,
            Droplets: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0z"/></svg>
        };

        const App = () => {
            const [view, setView] = useState(() => localStorage.getItem('jp_view') || 'weekday');
            const [taskMode, setTaskMode] = useState(() => localStorage.getItem('jp_taskMode') || 'desired');
            const [checkedTasks, setCheckedTasks] = useState(() => {
                const saved = localStorage.getItem('jp_checkedTasks');
                return saved ? JSON.parse(saved) : {};
            });
            const [weeklyStats, setWeeklyStats] = useState(() => {
                const saved = localStorage.getItem('jp_stats_v3');
                return saved ? JSON.parse(saved) : [0, 0, 0, 0, 0, 0, 0];
            });

            const [quoteIndex, setQuoteIndex] = useState(0);
            const [consequenceIndex, setConsequenceIndex] = useState(0);
            const [timeLeft, setTimeLeft] = useState({ days: 0, percentage: 0, color: 'rgb(239, 68, 68)' });
            const [fade, setFade] = useState(true);

            const startDate = new Date('2026-03-08').getTime(); 
            const targetDate = new Date('2026-08-07').getTime(); 

            const quotes = [
                { text: "La disciplina es el puente entre quien eres hoy y quien quieres ser el 7 de agosto.", author: "JP" },
                { text: "Cada pomodoro es un ladrillo en el edificio de tu libertad financiera.", author: "JP" },
                { text: "El Juan Pablo de 260 lbs se construye en los días que no tienes ganas.", author: "JP" },
                { text: "Si no trabajas por tus sueños, alguien te contratará para los suyos.", author: "Steve Jobs" },
                { text: "Tus miedos son solo mentiras que te cuentas para no crecer.", author: "JP" }
            ];

            const consequences = [
                "Vivir con deudas que te ahoguen el resto de tu vida.",
                "Ver a tu mamá trabajando en 2 empleos hasta envejecer.",
                "Quedarte siendo una persona promedio que nadie recuerda.",
                "Ser esclavo de un horario de 3 PM a 11 PM para siempre."
            ];

            const tasks = {
                desired: [
                    { id: 'd1', text: "+10k Pasos", icon: <Icons.Zap />, type: "bio" },
                    { id: 'd2', text: "2000 Calorías", icon: <Icons.Target />, type: "health" },
                    { id: 'd3', text: "5 Pomodoros Focus", icon: <Icons.Timer />, type: "work" },
                    { id: 'd4', text: "Gym / Casa", icon: <Icons.Dumbbell />, type: "health" },
                    { id: 'd5', text: "3 Litros Agua", icon: <Icons.Droplets />, type: "bio" },
                    { id: 'd6', text: "Cero Azúcar", icon: <Icons.Skull />, type: "health" }
                ],
                minimal: [
                    { id: 'm1', text: "7k Pasos Base", icon: <Icons.Sun />, type: "bio" },
                    { id: 'm2', text: "2 Pomos Agencia (1h)", icon: <Icons.Briefcase />, type: "work" },
                    { id: 'm3', text: "15 min Actividad", icon: <Icons.Zap />, type: "health" },
                    { id: 'm4', text: "3 Litros Agua", icon: <Icons.Droplets />, type: "bio" },
                    { id: 'm5', text: "Cero Dulces / Sodas", icon: <Icons.Skull />, type: "health" }
                ]
            };

            const schedule = {
                weekday: [
                    { time: "06:30 AM", task: "Wake Up", icon: <Icons.Sun />, type: "bio" },
                    { time: "07:00 AM", task: "Agency: 5 Pomos", icon: <Icons.Briefcase />, type: "work" },
                    { time: "03:00 PM", task: "Chick-fil-A", icon: <Icons.Zap />, type: "job" },
                    { time: "12:30 AM", task: "Sleep", icon: <Icons.Moon />, type: "rest" }
                ],
                growthDays: [
                    { time: "10:30 AM", task: "Wake Up (10h)", icon: <Icons.Coffee />, type: "rest" },
                    { time: "11:30 AM", task: "CEO Block 1", icon: <Icons.Briefcase />, type: "work" },
                    { time: "05:30 PM", task: "CEO Block 2", icon: <Icons.Briefcase />, type: "work" },
                    { time: "12:30 AM", task: "Sleep", icon: <Icons.Moon />, type: "rest" }
                ]
            };

            // ACTUALIZACIÓN DINÁMICA DEL GRÁFICO
            useEffect(() => {
                const dayIndex = (new Date().getDay() + 6) % 7; 
                const activeTasks = tasks[taskMode];
                const checkedCount = activeTasks.filter(t => checkedTasks[t.id]).length;
                const percentage = (checkedCount / activeTasks.length) * 100;
                
                const newStats = [...weeklyStats];
                newStats[dayIndex] = percentage;
                setWeeklyStats(newStats);
                localStorage.setItem('jp_stats_v3', JSON.stringify(newStats));
                
                localStorage.setItem('jp_view', view);
                localStorage.setItem('jp_taskMode', taskMode);
                localStorage.setItem('jp_checkedTasks', JSON.stringify(checkedTasks));
            }, [checkedTasks, taskMode, view]);

            useEffect(() => {
                const calculateTime = () => {
                    const now = new Date().getTime();
                    const total = targetDate - startDate;
                    const elapsed = now - startDate;
                    const remaining = targetDate - now;
                    const days = Math.floor(remaining / 86400000);
                    const progress = Math.min(Math.max((elapsed / total) * 100, 0), 100);
                    const hue = (progress / 100) * 120;
                    setTimeLeft({ days, percentage: progress.toFixed(2), color: `hsl(${hue}, 80%, 50%)` });
                };
                calculateTime();
                const interval = setInterval(() => {
                    setFade(false);
                    setTimeout(() => {
                        setQuoteIndex(p => (p + 1) % quotes.length);
                        setConsequenceIndex(p => (p + 1) % consequences.length);
                        setFade(true);
                    }, 500);
                }, 8000);
                return () => clearInterval(interval);
            }, []);

            return (
                <div className="max-w-md mx-auto min-h-screen pb-10 bg-black text-white px-4">
                    {/* Header */}
                    <header className="sticky top-0 z-50 bg-black/95 backdrop-blur py-6 border-b border-zinc-800">
                        <div className="flex justify-between items-end mb-3">
                            <div>
                                <h1 className="text-2xl font-black text-blue-500 italic uppercase tracking-tighter">LOCK-IN 2026</h1>
                                <p className="text-[10px] text-zinc-500 font-bold tracking-widest uppercase">The JPD Agency</p>
                            </div>
                            <div className="text-right">
                                <span className="text-4xl font-black text-white leading-none">{timeLeft.days}</span>
                                <span className="text-[10px] font-black text-blue-500 ml-1 italic uppercase tracking-widest">Días</span>
                            </div>
                        </div>
                        <div className="w-full h-3 bg-zinc-900 rounded-full border border-zinc-800 overflow-hidden">
                            <div className="h-full stat-bar" style={{ width: `${timeLeft.percentage}%`, backgroundColor: timeLeft.color, boxShadow: `0 0 15px ${timeLeft.color}66` }}></div>
                        </div>
                    </header>

                    <main className="mt-8 space-y-8">
                        {/* Objectives */}
                        <section className="bg-zinc-950 rounded-[2.5rem] p-6 border border-zinc-800 shadow-2xl">
                            <div className="flex justify-between items-center mb-6">
                                <h2 className="text-xl font-black uppercase italic flex items-center gap-2 tracking-tighter text-white">
                                    <Icons.Target /> Objetivos
                                </h2>
                                <button onClick={() => setTaskMode(taskMode === 'desired' ? 'minimal' : 'desired')} className={`px-4 py-1.5 rounded-xl text-[10px] font-black uppercase transition-all ${taskMode === 'desired' ? 'bg-blue-600' : 'bg-red-600 animate-pulse shadow-[0_0_15px_rgba(220,38,38,0.5)]'}`}>
                                    {taskMode === 'desired' ? 'Deseada' : 'Mínimo'}
                                </button>
                            </div>
                            <div className="space-y-3">
                                {tasks[taskMode].map(t => (
                                    <div key={t.id} onClick={() => setCheckedTasks(prev => ({...prev, [t.id]: !prev[t.id]}))} className={`flex items-center gap-4 p-5 rounded-[1.8rem] border-2 transition-all active:scale-[0.97] ${checkedTasks[t.id] ? 'bg-blue-900/20 border-blue-500/40' : 'bg-zinc-900 border-transparent hover:border-zinc-700'}`}>
                                        <div className={`w-7 h-7 rounded-xl border-2 flex items-center justify-center transition-all ${checkedTasks[t.id] ? 'bg-blue-600 border-blue-600 shadow-[0_0_10px_rgba(37,99,235,0.5)]' : 'border-zinc-700 bg-black'}`}>
                                            {checkedTasks[t.id] && <div className="w-2.5 h-2.5 bg-white rounded-full"></div>}
                                        </div>
                                        <p className={`flex-1 font-bold text-base transition-colors ${checkedTasks[t.id] ? 'text-zinc-500 line-through' : 'text-white'}`}>{t.text}</p>
                                        <div className={`transition-opacity ${checkedTasks[t.id] ? 'opacity-20' : 'opacity-100'}`}>{t.icon}</div>
                                    </div>
                                ))}
                            </div>
                        </section>

                        {/* Disciplina Semanal - Corregido Escalado */}
                        <section className="bg-zinc-950 rounded-[2.5rem] p-6 border border-zinc-800 shadow-xl">
                            <div className="flex justify-between items-center mb-6">
                                <h2 className="text-xs font-black uppercase text-zinc-500 tracking-[0.2em]">Desempeño Semanal</h2>
                                <span className="text-[10px] font-bold text-blue-500 uppercase italic">Lock-In Stats</span>
                            </div>
                            <div className="flex items-end justify-between h-24 px-1 gap-3">
                                {weeklyStats.map((val, i) => (
                                    <div key={i} className="flex flex-col items-center gap-2 flex-1 group">
                                        <div className="relative w-full flex justify-center items-end h-full">
                                            <div className="w-1.5 bg-zinc-900 rounded-full absolute h-full"></div>
                                            <div className="w-1.5 bg-gradient-to-t from-blue-700 to-blue-400 rounded-full stat-bar relative z-10" style={{ height: `${val > 0 ? val : 5}%`, opacity: val > 0 ? 1 : 0.2 }}>
                                            </div>
                                        </div>
                                        <span className={`text-[10px] font-black uppercase ${i === (new Date().getDay() + 6) % 7 ? 'text-blue-500' : 'text-zinc-600'}`}>{['L','M','M','J','V','S','D'][i]}</span>
                                    </div>
                                ))}
                            </div>
                        </section>

                        {/* Agenda */}
                        <section className="space-y-4">
                            <div className="flex gap-2 p-1 bg-zinc-900 rounded-2xl w-fit border border-zinc-800">
                                <button onClick={() => setView('weekday')} className={`px-6 py-2 rounded-xl font-black text-[10px] uppercase transition-all ${view === 'weekday' ? 'bg-blue-600 shadow-lg' : 'text-zinc-500'}`}>Mar - Sáb</button>
                                <button onClick={() => setView('growthDays')} className={`px-6 py-2 rounded-xl font-black text-[10px] uppercase transition-all ${view === 'growthDays' ? 'bg-blue-600 shadow-lg' : 'text-zinc-500'}`}>Dom - Lun</button>
                            </div>
                            <div className="bg-zinc-950 rounded-[2.5rem] p-2 border border-zinc-800 shadow-2xl overflow-hidden">
                                {(view === 'weekday' ? schedule.weekday : schedule.growthDays).map((item, idx) => (
                                    <div key={idx} className="flex items-center gap-5 p-5 border-b border-zinc-900/50 last:border-0 group">
                                        <div className="flex flex-col items-center justify-center min-w-[75px] border-r border-zinc-800 pr-5">
                                            <span className="text-2xl font-black text-white italic tracking-tighter">{item.time.split(' ')[0]}</span>
                                            <span className="text-[10px] font-black text-blue-500 uppercase tracking-widest">{item.time.split(' ')[1]}</span>
                                        </div>
                                        <div className="flex-1">
                                            <p className="text-lg font-bold text-zinc-100 group-hover:text-blue-400 transition-colors tracking-tight">{item.task}</p>
                                            <p className={`text-[9px] font-black uppercase tracking-[0.15em] mt-1 ${item.type === 'work' ? 'text-blue-500' : item.type === 'job' ? 'text-red-500' : 'text-zinc-500'}`}>{item.type}</p>
                                        </div>
                                        <div className="p-3 bg-zinc-900 rounded-2xl group-hover:bg-blue-900/20 transition-all">{item.icon}</div>
                                    </div>
                                ))}
                            </div>
                        </section>

                        {/* Fear & Mindset */}
                        <section className="bg-red-950/20 border-2 border-red-900/40 rounded-[2.5rem] p-8 min-h-[140px] flex flex-col justify-center shadow-[0_0_20px_rgba(239,68,68,0.1)]">
                            <p className="text-[10px] font-black uppercase tracking-[0.3em] text-red-500 mb-3 italic">Costo del Fracaso</p>
                            <p className={`text-lg font-bold text-red-100 italic transition-opacity duration-500 leading-snug ${fade ? 'opacity-100' : 'opacity-0'}`}>"{consequences[consequenceIndex]}"</p>
                        </section>

                        <section className="bg-gradient-to-br from-blue-700 via-indigo-900 to-black rounded-[2.5rem] p-10 min-h-[220px] flex flex-col justify-center relative overflow-hidden shadow-2xl">
                            <div className={`relative z-10 transition-opacity duration-500 ${fade ? 'opacity-100' : 'opacity-0'}`}>
                                <p className="text-[11px] font-black uppercase tracking-widest text-blue-300 mb-4 italic">#Mindset Lock-In</p>
                                <p className="text-2xl font-black italic leading-tight tracking-tight text-white">"{quotes[quoteIndex].text}"</p>
                                <p className="text-[10px] text-blue-400 font-bold mt-4 uppercase tracking-[0.2em]">— {quotes[quoteIndex].author}</p>
                            </div>
                            <div className="absolute -bottom-8 -right-8 text-white/5 font-black text-9xl italic select-none">#JPD</div>
                        </section>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
