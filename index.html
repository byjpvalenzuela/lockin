<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lock-In 2026 | JPD Agency</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: black; -webkit-tap-highlight-color: transparent; color: white; margin: 0; padding: 0; }
        ::-webkit-scrollbar { display: none; }
        .stat-bar { transition: height 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .sticky-header { position: sticky; top: 0; z-index: 100; background: rgba(0, 0, 0, 0.95); backdrop-filter: blur(10px); }
        .ios-fix { padding-bottom: env(safe-area-inset-bottom); }
        textarea:focus, input:focus { outline: none; border-color: #3b82f6; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const Icons = {
            Zap: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>,
            Target: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>,
            Timer: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="10" y1="2" x2="14" y2="2"/><line x1="12" y1="14" x2="15" y2="11"/><circle cx="12" cy="14" r="8"/></svg>,
            Dumbbell: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M6.5 6.5h11"/><path d="M6.5 17.5h11"/><path d="M3 10v4"/><path d="M21 10v4"/><path d="M3 5v14"/><path d="M21 5v14"/><path d="M18 5v14"/><path d="M6 5v14"/></svg>,
            Skull: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M9 10L9.01 10"/><path d="M15 10L15.01 10"/><path d="M10 18l4-8"/><path d="M12 2a8 8 0 0 0-8 8c0 1.5.5 3.5 1 4a3 3 0 0 1 .5 6c0 1 1.5 2 3 2s3-1 3-2a3 3 0 0 1 .5-6c.5-.5 1-2.5 1-4a8 8 0 0 0-8-8z"/></svg>,
            Briefcase: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>,
            Sun: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/></svg>,
            Moon: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>,
            Coffee: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M17 8h1a4 4 0 1 1 0 8h-1"/><path d="M3 8h14v9a4 4 0 0 1-4 4H7a4 4 0 0 1-4-4V8z"/></svg>,
            Droplets: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0z"/></svg>,
            Book: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>,
            Save: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>,
            Plus: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
            ChevronDown: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 12 15 18 9"/></svg>,
            Trash: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#ef4444" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>
        };

        const App = () => {
            const [view, setView] = useState(() => localStorage.getItem('jp_view') || 'weekday');
            const [taskMode, setTaskMode] = useState(() => localStorage.getItem('jp_taskMode') || 'desired');
            const [checkedTasks, setCheckedTasks] = useState(() => {
                const saved = localStorage.getItem('jp_checkedTasks');
                const lastDate = localStorage.getItem('jp_last_reset_date');
                const today = new Date().toLocaleDateString();
                if (lastDate !== today) {
                    localStorage.setItem('jp_last_reset_date', today);
                    return {};
                }
                return saved ? JSON.parse(saved) : {};
            });

            const [currentNote, setCurrentNote] = useState('');
            const [diaryEntries, setDiaryEntries] = useState(() => {
                const saved = localStorage.getItem('jp_diary_entries');
                return saved ? JSON.parse(saved) : [];
            });
            const [expandedEntry, setExpandedEntry] = useState(null);

            const [consequences, setConsequences] = useState(() => {
                const saved = localStorage.getItem('jp_consequences');
                return saved ? JSON.parse(saved) : [
                    "Vivir con deudas que te ahoguen el resto de tu vida.",
                    "Ver a tu mamá trabajando en 2 empleos hasta envejecer.",
                    "Quedarte siendo una persona promedio que nadie recuerda.",
                    "Ser esclavo de un horario de 3 PM a 11 PM para siempre."
                ];
            });
            const [newFear, setNewFear] = useState('');
            const [showFearInput, setShowFearInput] = useState(false);

            const [quotes, setQuotes] = useState(() => {
                const saved = localStorage.getItem('jp_mindset_quotes');
                return saved ? JSON.parse(saved) : [
                    { text: "La disciplina es el puente entre quien eres hoy y quien quieres ser el 7 de agosto.", author: "JP" },
                    { text: "Cada pomodoro es un ladrillo en el edificio de tu libertad financiera.", author: "JP" },
                    { text: "El Juan Pablo de 260 lbs se construye en los días que no tienes ganas.", author: "JP" },
                    { text: "Tus miedos son solo mentiras que te cuentas para no crecer.", author: "JP" },
                    { text: "No te detengas cuando estés cansado, detente cuando hayas terminado.", author: "David Goggins" }
                ];
            });
            const [newQuoteText, setNewQuoteText] = useState('');
            const [newQuoteAuthor, setNewQuoteAuthor] = useState('');
            const [showQuoteInput, setShowQuoteInput] = useState(false);

            const [quoteIndex, setQuoteIndex] = useState(0);
            const [consequenceIndex, setConsequenceIndex] = useState(0);
            const [timeLeft, setTimeLeft] = useState({ days: 0, percentage: 0, color: 'rgb(239, 68, 68)' });
            const [fade, setFade] = useState(true);

            const startDate = new Date('2026-03-08').getTime(); 
            const targetDate = new Date('2026-08-07').getTime(); 

            const tasks = {
                desired: [
                    { id: 'd1', text: "+10k Pasos diarios", icon: <Icons.Zap />, type: "bio" },
                    { id: 'd2', text: "2000 Calorías (Trackeadas)", icon: <Icons.Target />, type: "health" },
                    { id: 'd3', text: "5 Pomodoros de Max Focus", icon: <Icons.Timer />, type: "work" },
                    { id: 'd4', text: "1 Hora de Gym / 30 Min Casa", icon: <Icons.Dumbbell />, type: "health" },
                    { id: 'd5', text: "3 Litros de Agua", icon: <Icons.Droplets />, type: "bio" },
                    { id: 'd6', text: "Cero Azúcares", icon: <Icons.Skull />, type: "health" }
                ],
                minimal: [
                    { id: 'm1', text: "7k Pasos Base", icon: <Icons.Sun />, type: "bio" },
                    { id: 'm2', text: "2 Pomos Agencia (1h Focus)", icon: <Icons.Briefcase />, type: "work" },
                    { id: 'm3', text: "15 min Actividad", icon: <Icons.Zap />, type: "health" },
                    { id: 'm4', text: "3 Litros de Agua", icon: <Icons.Droplets />, type: "bio" },
                    { id: 'm5', text: "Cero Dulces / Sodas", icon: <Icons.Skull />, type: "health" }
                ]
            };

            const schedule = {
                weekday: [
                    { time: "06:30 AM", task: "Wake Up + Sol", icon: <Icons.Sun />, type: "bio" },
                    { time: "07:00 AM", task: "Agency: 5 Pomodoros", icon: <Icons.Briefcase />, type: "work" },
                    { time: "03:00 PM", task: "Chick-fil-A Shift", icon: <Icons.Zap />, type: "job" },
                    { time: "12:30 AM", task: "Sleep Lock-In", icon: <Icons.Moon />, type: "rest" }
                ],
                growthDays: [
                    { time: "10:30 AM", task: "Wake Up Recovery (10h)", icon: <Icons.Coffee />, type: "rest" },
                    { time: "11:30 AM", task: "CEO Focus Block 1", icon: <Icons.Briefcase />, type: "work" },
                    { time: "05:30 PM", task: "CEO Focus Block 2", icon: <Icons.Briefcase />, type: "work" },
                    { time: "12:30 AM", task: "Sleep Mode", icon: <Icons.Moon />, type: "rest" }
                ]
            };

            useEffect(() => {
                localStorage.setItem('jp_view', view);
                localStorage.setItem('jp_taskMode', taskMode);
                localStorage.setItem('jp_checkedTasks', JSON.stringify(checkedTasks));
                localStorage.setItem('jp_diary_entries', JSON.stringify(diaryEntries));
                localStorage.setItem('jp_consequences', JSON.stringify(consequences));
                localStorage.setItem('jp_mindset_quotes', JSON.stringify(quotes));
            }, [checkedTasks, taskMode, view, diaryEntries, consequences, quotes]);

            useEffect(() => {
                const calculateTime = () => {
                    const now = new Date().getTime();
                    const total = targetDate - startDate;
                    const elapsed = now - startDate;
                    const remaining = targetDate - now;
                    const days = Math.floor(remaining / 86400000);
                    const progress = Math.min(Math.max((elapsed / total) * 100, 0), 100);
                    const hue = (progress / 100) * 120;
                    setTimeLeft({ days, percentage: progress.toFixed(2), color: `hsl(${hue}, 80%, 50%)` });
                };
                calculateTime();
                const interval = setInterval(() => {
                    setFade(false);
                    setTimeout(() => {
                        setQuoteIndex(p => (p + 1) % quotes.length);
                        setConsequenceIndex(p => (p + 1) % consequences.length);
                        setFade(true);
                    }, 500);
                }, 8000);
                return () => clearInterval(interval);
            }, [consequences, quotes]);

            const saveDiaryEntry = () => {
                if (!currentNote.trim()) return;
                const newEntry = { id: Date.now(), date: new Date().toLocaleDateString('es-ES', { weekday: 'long', day: 'numeric', month: 'long' }), content: currentNote };
                setDiaryEntries(prev => [newEntry, ...prev]);
                setCurrentNote('');
            };

            const addFear = () => {
                if (!newFear.trim()) return;
                setConsequences(prev => [...prev, newFear]);
                setNewFear('');
                setShowFearInput(false);
            };

            const addQuote = () => {
                if (!newQuoteText.trim()) return;
                setQuotes(prev => [...prev, { text: newQuoteText, author: newQuoteAuthor || "JP" }]);
                setNewQuoteText('');
                setNewQuoteAuthor('');
                setShowQuoteInput(false);
            };

            const deleteEntry = (id, e) => {
                e.stopPropagation();
                if (window.confirm("¿Borrar esta entrada de tu historia?")) {
                    setDiaryEntries(prev => prev.filter(e => e.id !== id));
                    if (expandedEntry === id) setExpandedEntry(null);
                }
            };

            return (
                <div className="max-w-md mx-auto min-h-screen bg-black text-white ios-fix">
                    <header className="sticky-header py-6 px-4 border-b border-zinc-800 shadow-2xl">
                        <div className="flex justify-between items-end mb-4">
                            <div>
                                <h1 className="text-2xl font-black text-blue-500 italic uppercase tracking-tighter leading-none">LOCK-IN 2026</h1>
                                <p className="text-[10px] text-zinc-500 font-bold tracking-widest uppercase mt-1">The JPD Agency</p>
                            </div>
                            <div className="text-right">
                                <span className="text-4xl font-black text-white leading-none">{timeLeft.days}</span>
                                <span className="text-[10px] font-black text-blue-500 ml-1 italic uppercase tracking-widest">Días</span>
                            </div>
                        </div>
                        <div className="w-full h-3 bg-zinc-900 rounded-full border border-zinc-800 overflow-hidden">
                            <div className="h-full stat-bar" style={{ width: `${timeLeft.percentage}%`, backgroundColor: timeLeft.color, boxShadow: `0 0 15px ${timeLeft.color}66` }}></div>
                        </div>
                    </header>

                    <main className="mt-6 px-4 pb-12 space-y-8">
                        {/* 1. Objetivos */}
                        <section className="bg-zinc-950 rounded-[2.5rem] p-6 border border-zinc-800 shadow-2xl">
                            <div className="flex justify-between items-center mb-6">
                                <h2 className="text-xl font-black uppercase italic flex items-center gap-2 tracking-tighter text-white"><Icons.Target /> Objetivos</h2>
                                <button onClick={() => setTaskMode(taskMode === 'desired' ? 'minimal' : 'desired')} className={`px-4 py-1.5 rounded-xl text-[10px] font-black uppercase transition-all ${taskMode === 'desired' ? 'bg-blue-600 shadow-lg' : 'bg-red-600 animate-pulse shadow-[0_0_15px_rgba(220,38,38,0.5)]'}`}>{taskMode === 'desired' ? 'Deseada' : 'Mínimo'}</button>
                            </div>
                            <div className="space-y-3">
                                {tasks[taskMode].map(t => (
                                    <div key={t.id} onClick={() => setCheckedTasks(prev => ({...prev, [t.id]: !prev[t.id]}))} className={`flex items-center gap-4 p-5 rounded-[1.8rem] border-2 transition-all active:scale-[0.97] ${checkedTasks[t.id] ? 'bg-blue-900/20 border-blue-500/40 opacity-70' : 'bg-zinc-900 border-transparent hover:border-zinc-700'}`}>
                                        <div className={`w-7 h-7 rounded-xl border-2 flex items-center justify-center transition-all ${checkedTasks[t.id] ? 'bg-blue-600 border-blue-600 shadow-[0_0_10px_rgba(37,99,235,0.5)]' : 'border-zinc-700 bg-black'}`}>
                                            {checkedTasks[t.id] && <div className="w-2.5 h-2.5 bg-white rounded-full"></div>}
                                        </div>
                                        <p className={`flex-1 font-bold text-base transition-colors ${checkedTasks[t.id] ? 'text-zinc-500 line-through' : 'text-white'}`}>{t.text}</p>
                                        <div className={`transition-opacity ${checkedTasks[t.id] ? 'opacity-20' : 'opacity-100'}`}>{t.icon}</div>
                                    </div>
                                ))}
                            </div>
                        </section>

                        {/* 2. Agenda */}
                        <section className="space-y-4">
                            <div className="flex gap-2 p-1 bg-zinc-900 rounded-2xl w-fit border border-zinc-800 ml-1">
                                <button onClick={() => setView('weekday')} className={`px-6 py-2 rounded-xl font-black text-[10px] uppercase transition-all ${view === 'weekday' ? 'bg-blue-600 shadow-lg' : 'text-zinc-500'}`}>Mar - Sáb</button>
                                <button onClick={() => setView('growthDays')} className={`px-6 py-2 rounded-xl font-black text-[10px] uppercase transition-all ${view === 'growthDays' ? 'bg-blue-600 shadow-lg' : 'text-zinc-500'}`}>Dom - Lun</button>
                            </div>
                            <div className="bg-zinc-950 rounded-[2.5rem] p-2 border border-zinc-800 shadow-2xl overflow-hidden">
                                {(view === 'weekday' ? schedule.weekday : schedule.growthDays).map((item, idx) => (
                                    <div key={idx} className="flex items-center gap-5 p-5 border-b border-zinc-900/50 last:border-0 group">
                                        <div className="flex flex-col items-center justify-center min-w-[75px] border-r border-zinc-800 pr-5">
                                            <span className="text-2xl font-black text-white italic tracking-tighter">{item.time.split(' ')[0]}</span>
                                            <span className="text-[10px] font-black text-blue-500 uppercase tracking-widest">{item.time.split(' ')[1]}</span>
                                        </div>
                                        <div className="flex-1">
                                            <p className="text-lg font-bold text-zinc-100 group-hover:text-blue-400 transition-colors tracking-tight">{item.task}</p>
                                            <p className={`text-[9px] font-black uppercase tracking-[0.15em] mt-1 ${item.type === 'work' ? 'text-blue-500' : item.type === 'job' ? 'text-red-500' : 'text-zinc-500'}`}>{item.type}</p>
                                        </div>
                                        <div className="p-3 bg-zinc-900 rounded-2xl group-hover:bg-blue-900/20 transition-all">{item.icon}</div>
                                    </div>
                                ))}
                            </div>
                        </section>

                        {/* 3. Diario Input */}
                        <section className="bg-zinc-950 rounded-[2.5rem] p-6 border border-zinc-800 shadow-2xl space-y-4">
                            <h2 className="text-xl font-black uppercase italic flex items-center gap-2 tracking-tighter text-white"><Icons.Book /> Diario de Hoy</h2>
                            <textarea value={currentNote} onChange={(e) => setCurrentNote(e.target.value)} placeholder="¿Cómo te sientes hoy, Juan Pablo?" className="w-full bg-zinc-900 rounded-2xl p-4 text-sm text-zinc-100 min-h-[120px] border border-zinc-800 resize-none transition-all" />
                            <button onClick={saveDiaryEntry} className="w-full bg-blue-600 hover:bg-blue-500 py-4 rounded-2xl font-black uppercase text-xs flex items-center justify-center gap-2 transition-all active:scale-95 shadow-lg shadow-blue-900/20"><Icons.Save /> Guardar en mi Diario</button>
                        </section>

                        {/* 4. Costo del Fracaso */}
                        <section className="bg-red-950/20 border-2 border-red-900/40 rounded-[2.5rem] p-8 min-h-[160px] flex flex-col justify-center shadow-[0_0_20px_rgba(239,68,68,0.1)] relative">
                            <div className="flex justify-between items-start mb-3">
                                <div className="flex items-center gap-2 text-red-500 italic"><Icons.Skull /><p className="text-[10px] font-black uppercase tracking-[0.3em] text-red-400">Costo del Fracaso</p></div>
                                <button onClick={() => setShowFearInput(!showFearInput)} className="p-1 bg-red-900/30 rounded-lg active:scale-90 transition-all"><Icons.Plus /></button>
                            </div>
                            {showFearInput ? (
                                <div className="space-y-3 mt-2">
                                    <input type="text" value={newFear} onChange={(e) => setNewFear(e.target.value)} placeholder="Nuevo miedo..." className="w-full bg-black border border-red-900/50 rounded-xl p-3 text-sm text-red-100" />
                                    <div className="flex gap-2"><button onClick={addFear} className="flex-1 bg-red-600 py-2 rounded-xl text-[10px] font-black uppercase">Añadir</button><button onClick={() => setShowFearInput(false)} className="px-4 bg-zinc-800 py-2 rounded-xl text-[10px] font-black uppercase text-zinc-400 text-xs">X</button></div>
                                </div>
                            ) : (
                                <p className={`text-lg font-bold text-red-100 italic transition-opacity duration-500 leading-snug ${fade ? 'opacity-100' : 'opacity-0'}`}>"{consequences[consequenceIndex]}"</p>
                            )}
                        </section>

                        {/* 5. Mindset Lock-In */}
                        <section className="bg-gradient-to-br from-blue-700 via-indigo-900 to-black rounded-[2.5rem] p-10 min-h-[220px] flex flex-col justify-center relative overflow-hidden shadow-2xl">
                            <div className="absolute top-6 right-6 z-20">
                                <button onClick={() => setShowQuoteInput(!showQuoteInput)} className="p-1.5 bg-white/10 rounded-lg active:scale-90 transition-all border border-white/20"><Icons.Plus /></button>
                            </div>
                            <div className="relative z-10 transition-opacity duration-500">
                                <p className="text-[11px] font-black uppercase tracking-widest text-blue-300 mb-4 italic">#Mindset Lock-In</p>
                                {showQuoteInput ? (
                                    <div className="space-y-3">
                                        <input type="text" value={newQuoteText} onChange={(e) => setNewQuoteText(e.target.value)} placeholder="Nueva frase de poder..." className="w-full bg-black/40 border border-blue-400/50 rounded-xl p-3 text-sm text-white" />
                                        <input type="text" value={newQuoteAuthor} onChange={(e) => setNewQuoteAuthor(e.target.value)} placeholder="Autor (ej. Goggins)..." className="w-full bg-black/40 border border-blue-400/50 rounded-xl p-3 text-xs text-blue-200" />
                                        <div className="flex gap-2"><button onClick={addQuote} className="flex-1 bg-blue-500 py-2 rounded-xl text-[10px] font-black uppercase">Añadir</button><button onClick={() => setShowQuoteInput(false)} className="px-4 bg-zinc-800 py-2 rounded-xl text-[10px] font-black uppercase text-zinc-400 text-xs">X</button></div>
                                    </div>
                                ) : (
                                    <div className={`transition-opacity duration-500 ${fade ? 'opacity-100' : 'opacity-0'}`}>
                                        <p className="text-2xl font-black italic leading-tight tracking-tight text-white italic">"{quotes[quoteIndex].text}"</p>
                                        <p className="text-[10px] text-blue-400 font-bold mt-4 uppercase tracking-[0.2em]">#{quotes[quoteIndex].author}</p>
                                    </div>
                                )}
                            </div>
                            <div className="absolute -bottom-8 -right-8 text-white/5 font-black text-9xl italic select-none">#JPD</div>
                        </section>

                        {/* 6. Historial Diario */}
                        <section className="space-y-4">
                            <h2 className="text-sm font-black uppercase text-zinc-500 tracking-[0.2em] px-4 italic underline decoration-blue-500 decoration-2 underline-offset-4">Diario de Juan Pablo</h2>
                            <div className="space-y-3">
                                {diaryEntries.map(entry => (
                                    <div key={entry.id} className="bg-zinc-950 border border-zinc-800 rounded-[1.5rem] overflow-hidden transition-all shadow-lg">
                                        <div onClick={() => setExpandedEntry(expandedEntry === entry.id ? null : entry.id)} className="p-5 flex justify-between items-center active:bg-zinc-900">
                                            <span className="text-xs font-black uppercase text-blue-500 tracking-tighter">{entry.date}</span>
                                            <Icons.ChevronDown />
                                        </div>
                                        {expandedEntry === entry.id && (
                                            <div className="px-5 pb-5 pt-0 animate-in slide-in-from-top-1">
                                                <div className="h-px bg-zinc-800 mb-4 w-full" />
                                                <p className="text-sm text-zinc-300 leading-relaxed whitespace-pre-wrap">{entry.content}</p>
                                                <div className="mt-6 flex justify-end">
                                                    <button onClick={(e) => deleteEntry(entry.id, e)} className="flex items-center gap-2 px-4 py-2 bg-red-950/30 border border-red-900/50 rounded-xl active:scale-95 transition-all">
                                                        <Icons.Trash />
                                                        <span className="text-[10px] font-black uppercase text-red-500">Borrar</span>
                                                    </button>
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                ))}
                            </div>
                        </section>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
